name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o crossagent ./cmd/crossagent

      - name: Unit tests
        run: go test ./...

      - name: Integration tests
        run: bash test/integration_test.sh ./crossagent

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check

  web:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build -o crossagent ./cmd/crossagent

      - name: Integration tests (with web smoke)
        env:
          CROSSAGENT_REQUIRE_WEB_SMOKE: '1'
        run: bash test/integration_test.sh ./crossagent
