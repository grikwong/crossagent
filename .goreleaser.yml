version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: crossagent
    main: ./cmd/crossagent
    binary: crossagent
    ldflags:
      - -s -w -X main.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: crossagent
    formats:
      - tar.gz
    name_template: "crossagent_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

homebrew_casks:
  - name: crossagent
    binaries:
      - crossagent
    repository:
      owner: grikwong
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/grikwong/crossagent"
    description: "Cross-model AI agent orchestrator with browser-based Web UI"
